name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check garmin_tracker/ tests/
      - name: Format check
        run: ruff format --check garmin_tracker/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn jinja2 python-dotenv anthropic
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn jinja2 python-dotenv anthropic
          pip install mypy
      - name: Type check
        run: mypy garmin_tracker/ --ignore-missing-imports
